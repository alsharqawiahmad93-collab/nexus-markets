const fmt=(n)=>{
if(n>=10000)return n.toLocaleString(“en-US”,{minimumFractionDigits:2,maximumFractionDigits:2});
if(n>=100)return n.toFixed(2);
if(n>=1)return n.toFixed(4);
return n.toFixed(6);
};
const fmtUSD=(n)=>`$${Math.abs(n)>=1000?Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):Math.abs(n).toFixed(2)}`;
const fmtPct=(n)=>`${n>=0?"+":""}${n.toFixed(2)}%`;

function genCandles(basePrice,count=100,tf=“1D”){
const candles=[],now=Date.now();
const tfMs={“1m”:60e3,“5m”:3e5,“15m”:9e5,“1h”:36e5,“4h”:144e5,“1D”:864e5,“1W”:6048e5};
const ms=tfMs[tf]||864e5;
let price=basePrice*0.75;
for(let i=count;i>=0;i–){
const vol=price*0.018;
const open=price;
const close=+(price+(Math.random()-0.47)*vol).toFixed(6);
const high=+(Math.max(open,close)+Math.random()*vol*0.6).toFixed(6);
const low=+(Math.min(open,close)-Math.random()*vol*0.6).toFixed(6);
candles.push({time:Math.floor((now-i*ms)/1000),open:+open.toFixed(6),high,low,close,volume:Math.floor(Math.random()*5e6+1e5)});
price=close;
}
return candles;
}

function genOrderBook(price){
const asks=[],bids=[];
let ap=price*1.00015,bp=price*0.99985;
for(let i=0;i<10;i++){
const as=+(Math.random()*30+0.5).toFixed(4);
const bs=+(Math.random()*30+0.5).toFixed(4);
asks.push({price:+ap.toFixed(6),size:as,total:+(as*ap).toFixed(2)});
bids.push({price:+bp.toFixed(6),size:bs,total:+(bs*bp).toFixed(2)});
ap*=1.00025;bp*=0.99975;
}
return{asks:asks.reverse(),bids};
}

function CandleChart({candles,livePrice,symbol}){
const canvasRef=useRef(null);
const UP=”#00e5a0”,DN=”#ff4d6d”,BG=”#06060f”,GRID=”#0d0d1c”,TEXT=”#444470”;
useEffect(()=>{
const canvas=canvasRef.current;
if(!canvas||!candles.length)return;
canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;
const ctx=canvas.getContext(“2d”);
const W=canvas.width,H=canvas.height;
const PAD={top:20,right:80,bottom:40,left:10};
const chartW=W-PAD.left-PAD.right,chartH=H-PAD.top-PAD.bottom;
const visible=candles.slice(-80);
const prices=visible.flatMap(c=>[c.high,c.low]);
const minP=Math.min(…prices)*0.9995,maxP=Math.max(…prices)*1.0005;
const priceRange=maxP-minP;
const toY=p=>PAD.top+chartH*(1-(p-minP)/priceRange);
const barW=Math.max(2,chartW/visible.length-1);
const toX=i=>PAD.left+i*(chartW/visible.length)+barW/2;
ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
ctx.strokeStyle=GRID;ctx.lineWidth=1;
for(let i=0;i<=5;i++){
const y=PAD.top+chartH*(i/5);
ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(W-PAD.right,y);ctx.stroke();
const price=maxP-(priceRange*(i/5));
ctx.fillStyle=TEXT;ctx.font=“10px ‘Space Mono’,monospace”;ctx.textAlign=“left”;
ctx.fillText(fmt(price),W-PAD.right+6,y+4);
}
const step=Math.ceil(visible.length/8);
for(let i=0;i<visible.length;i+=step){
const x=toX(i);
ctx.beginPath();ctx.strokeStyle=GRID;ctx.moveTo(x,PAD.top);ctx.lineTo(x,PAD.top+chartH);ctx.stroke();
const d=new Date(visible[i].time*1000);
ctx.fillStyle=TEXT;ctx.textAlign=“center”;ctx.font=“9px ‘Space Mono’,monospace”;
ctx.fillText(d.toLocaleDateString([],{month:“short”,day:“numeric”}),x,PAD.top+chartH+16);
}
visible.forEach((c,i)=>{
const x=toX(i);const isUp=c.close>=c.open;const color=isUp?UP:DN;
ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(x,toY(c.high));ctx.lineTo(x,toY(c.low));ctx.stroke();
const bodyTop=toY(Math.max(c.open,c.close));
const bodyBot=toY(Math.min(c.open,c.close));
const bodyH=Math.max(1,bodyBot-bodyTop);
if(isUp){ctx.strokeRect(x-barW/2,bodyTop,barW,bodyH);}
else{ctx.fillRect(x-barW/2,bodyTop,barW,bodyH);}
});
if(livePrice){
const y=toY(livePrice);
ctx.strokeStyle=UP;ctx.lineWidth=1;ctx.setLineDash([4,4]);
ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(W-PAD.right,y);ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle=UP;ctx.fillRect(W-PAD.right,y-10,PAD.right,20);
ctx.fillStyle=”#000”;ctx.font=“bold 10px ‘Space Mono’,monospace”;ctx.textAlign=“center”;
ctx.fillText(fmt(livePrice),W-PAD.right+40,y+4);
}
ctx.fillStyle=”#0d0d20”;ctx.font=“bold 40px ‘Space Mono’,monospace”;ctx.textAlign=“center”;
ctx.fillText(symbol,W/2,H/2+15);
},[candles,livePrice,symbol]);
return <canvas ref={canvasRef} style={{display:“block”,width:“100%”,height:“100%”}}/>;
}

function OrderBook({asset}){

<div key={r.price} style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,padding:“2px 10px”,position:“relative”,alignItems:“center”,fontSize:10}}>
<div style={{position:“absolute”,right:0,top:0,bottom:0,width:`${(r.total/maxT)*100}%`,background:side===“ask”?”#ff4d6d0d”:”#00e5a00d”}}/>
<span style={{color:side===“ask”?”#ff4d6d”:”#00e5a0”,fontFamily:”‘Space Mono’,monospace”,zIndex:1}}>{fmt(r.price)}</span>
<span style={{textAlign:“center”,color:”#6060a0”,fontFamily:”‘Space Mono’,monospace”,zIndex:1}}>{r.size.toFixed(3)}</span>
<span style={{textAlign:“right”,color:”#333360”,fontFamily:”‘Space Mono’,monospace”,zIndex:1}}>{fmtUSD(r.total)}</span>
</div>
);
return(
<div style={{display:“flex”,flexDirection:“column”,height:“100%”}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,padding:“4px 10px 6px”,fontSize:9,color:”#222245”,fontFamily:”‘Space Mono’,monospace”,letterSpacing:0.5}}>
<span>PRICE</span><span style={{textAlign:“center”}}>SIZE</span><span style={{textAlign:“right”}}>TOTAL</span>
</div>
<div style={{flex:1,overflowY:“auto”}}>
{ob.asks.map(r=>row(r,“ask”))}
<div style={{textAlign:“center”,padding:“6px 10px”,background:”#0a0a18”,color:asset.changePct>=0?”#00e5a0”:”#ff4d6d”,fontWeight:700,fontSize:13,fontFamily:”‘Space Mono’,monospace”,letterSpacing:1}}>
{fmt(asset.price)} <span style={{fontSize:9,opacity:0.6}}>{fmtPct(asset.changePct)}</span>
</div>
{ob.bids.map(r=>row(r,“bid”))}
</div>
</div>
);
}

function TradePanel({asset}){

]);

const total=qty?(parseFloat(qty)*ep).toFixed(2):”—”;

if(!qty)return;
setOrders(p=>[{id:Date.now(),symbol:asset.symbol,side,type,qty:parseFloat(qty),price:ep,status:“filled”},…p]);
setQty(””);

<div style={{display:“flex”,flexDirection:“column”,height:“100%”}}>

</div>
<div style={{display:“flex”,justifyContent:“space-between”,fontSize:10,color:”#333360”,fontFamily:”‘Space Mono’,monospace”}}>

function Portfolio(){
const tv=PORTFOLIO.reduce((s,p)=>s+p.qty*p.current,0);
const tc=PORTFOLIO.reduce((s,p)=>s+p.qty*p.avgCost,0);
const pnl=tv-tc,pct=(pnl/tc)*100;
const hist=Array.from({length:30},(_,i)=>({d:i,v:tv*(0.82+0.18*(i/29)+(Math.random()-0.4)*0.025)}));
return(
<div style={{height:“100%”,overflowY:“auto”,padding:14}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,gap:10,marginBottom:14}}>
{[{l:“PORTFOLIO VALUE”,v:fmtUSD(tv),c:”#c0c0f0”},{l:“TOTAL P&L”,v:`${pnl>=0?"+":""}${fmtUSD(pnl)}`,c:pnl>=0?”#00e5a0”:”#ff4d6d”},{l:“RETURN”,v:fmtPct(pct),c:pct>=0?”#00e5a0”:”#ff4d6d”}].map(x=>(
<div key={x.l} style={{background:”#0d0d1f”,border:“1px solid #1a1a35”,borderRadius:7,padding:“11px 13px”}}>
<div style={{fontSize:8,color:”#333360”,fontFamily:”‘Space Mono’,monospace”,letterSpacing:1,marginBottom:5}}>{x.l}</div>
<div style={{fontSize:15,fontWeight:700,color:x.c,fontFamily:”‘Space Mono’,monospace”}}>{x.v}</div>
</div>
))}
</div>
<div style={{background:”#0d0d1f”,border:“1px solid #1a1a35”,borderRadius:7,padding:12,marginBottom:14,height:120}}>
<div style={{fontSize:8,color:”#333360”,fontFamily:”‘Space Mono’,monospace”,letterSpacing:1,marginBottom:4}}>30D PERFORMANCE</div>

<div style={{padding:“9px 13px”,borderBottom:“1px solid #111120”,display:“grid”,gridTemplateColumns:“1.5fr 1fr 1fr 1fr 1fr”,fontSize:8,color:”#333360”,fontFamily:”‘Space Mono’,monospace”,letterSpacing:1}}>

</div>
{PORTFOLIO.map(p=>{
const pl=(p.current-p.avgCost)*p.qty,pc=((p.current-p.avgCost)/p.avgCost)*100;
return(
<div key={p.symbol} style={{padding:“9px 13px”,borderBottom:“1px solid #0d0d1a”,display:“grid”,gridTemplateColumns:“1.5fr 1fr 1fr 1fr 1fr”,alignItems:“center”}}>

}
